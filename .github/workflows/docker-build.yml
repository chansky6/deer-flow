name: Build and Push Docker Images

on:
  push:
    branches:
      - prod

env:
  REGISTRY: ghcr.io
  OWNER: chansky6

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/${{ env.OWNER }}/deer-flow-backend:latest

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./web
          push: true
          build-args: |
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
          tags: ghcr.io/${{ env.OWNER }}/deer-flow-frontend:latest
