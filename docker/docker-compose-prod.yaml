# ============================================================
# 合并部署配置：DeerFlow + OpenClaw
# Usage: docker compose -f docker-compose-prod.yaml up --build -d
# ============================================================

version: '3.8'

services:
  # ── Reverse Proxy (统一入口) ──
  nginx:
    image: nginx:alpine
    container_name: deer-flow-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.prod.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro  # 通配符证书 *.bbit.fun
    depends_on:
      frontend:
        condition: service_started
      gateway:
        condition: service_started
      langgraph:
        condition: service_started
    networks:
      - deer-flow-prod
    restart: always

  # ── PostgreSQL (checkpointer state) ──
  postgres:
    image: postgres:16-alpine
    container_name: deer-flow-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-deerflow}
      - POSTGRES_USER=${POSTGRES_USER:-deerflow}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-change-me}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-deerflow} -d ${POSTGRES_DB:-deerflow}"]
      interval: 10s
      timeout: 5s
      retries: 6
    networks:
      - deer-flow-prod
    restart: always

  # ── Frontend (Next.js production build) ──
  frontend:
    build:
      context: ../
      dockerfile: frontend/Dockerfile.prod
    container_name: deer-flow-frontend
    environment:
      - NODE_ENV=production
      - BACKEND_BASE_URL=http://gateway:8001
      - AUTH_DATABASE_URL=${AUTH_DATABASE_URL:-postgresql://deerflow:change-me@postgres:5432/deerflow}
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET:-default-change-me-in-production}
      - INTERNAL_AUTH_JWT_SECRET=${INTERNAL_AUTH_JWT_SECRET:-default-change-me-in-production}
    env_file:
      - ../frontend/.env
    networks:
      - deer-flow-prod
    restart: always

  # ── Gateway API ──
  gateway:
    build:
      context: ../
      dockerfile: backend/Dockerfile.prod
    container_name: deer-flow-gateway
    command: >
      sh -c "cd backend && uv run uvicorn src.gateway.app:app
      --host 0.0.0.0 --port 8001 --workers 2"
    volumes:
      - ../config.yaml:/app/config.yaml
      - ../extensions_config.json:/app/extensions_config.json
      - ../skills:/app/skills
      - deer-flow-data:/app/backend/.deer-flow
    environment:
      - AUTH_DATABASE_URL=${AUTH_DATABASE_URL:-postgresql://deerflow:change-me@postgres:5432/deerflow}
      - DEER_FLOW_POSTGRES_URL=${DEER_FLOW_POSTGRES_URL:-postgresql://deerflow:change-me@postgres:5432/deerflow}
      - INTERNAL_AUTH_JWT_SECRET=${INTERNAL_AUTH_JWT_SECRET:-default-change-me-in-production}
      - LANGGRAPH_UPSTREAM_URL=http://langgraph:2024
    env_file:
      - ../.env
    depends_on:
      postgres:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - deer-flow-prod
    restart: always

  # ── LangGraph Server ──
  langgraph:
    build:
      context: ../
      dockerfile: backend/Dockerfile.prod
    container_name: deer-flow-langgraph
    command: >
      sh -c "cd backend && exec uv run langgraph dev
      --no-browser --allow-blocking
      --host 0.0.0.0 --port 2024"
    volumes:
      - ../config.yaml:/app/config.yaml
      - ../extensions_config.json:/app/extensions_config.json
      - ../skills:/app/skills
      - deer-flow-data:/app/backend/.deer-flow
      - langgraph-state:/app/backend/.langgraph_api
    environment:
      - DEER_FLOW_POSTGRES_URL=${DEER_FLOW_POSTGRES_URL:-postgresql://deerflow:change-me@postgres:5432/deerflow}
    env_file:
      - ../.env
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - deer-flow-prod
    restart: always
    stop_grace_period: 30s
    stop_signal: SIGTERM

# ── Volumes ──
volumes:
  deer-flow-data:
  langgraph-state:
  postgres-data:

# ── Networks ──
networks:
  deer-flow-prod:
    driver: bridge
